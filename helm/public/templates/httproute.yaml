{{- if .Values.route.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.appName }}
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.route.gatewayName }}
      namespace: {{ .Values.route.gatewayNamespace }}
  hostnames:
    - {{ .Values.route.host | quote }}
  rules:
    - backendRefs:
        - name: {{ .Values.appName }}
          port: 80
{{- end }}
