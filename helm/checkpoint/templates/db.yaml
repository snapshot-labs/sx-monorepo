apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.appName }}-db-{{ .Values.color }}
  namespace: {{ .Values.namespace }}
spec:
  serviceName: {{ .Values.appName }}-db-{{ .Values.color }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.appName }}-db
      color: {{ .Values.color }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.appName }}-db
        color: {{ .Values.color }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    color: {{ ternary "green" "blue" (eq .Values.color "blue") }}
                topologyKey: kubernetes.io/hostname
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.db.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.db.name | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.appName }}-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.db.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}-db-{{ .Values.color }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.appName }}-db
    color: {{ .Values.color }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ .Values.appName }}-db
    color: {{ .Values.color }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
