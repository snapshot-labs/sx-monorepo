color: blue

image:
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecret: ghcr

# Set per-env (e.g. pin mainnet to its tainted node pool).
nodeSelector: {}
tolerations: []

# Non-secret env, rendered into the ConfigMap. Set per app/env.
config: {}

db:
  user: postgres
  name: api
  storage: 10Gi

api:
  replicas: 1
