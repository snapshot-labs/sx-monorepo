apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}-indexer-{{ .Values.color }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.appName }}-indexer
      color: {{ .Values.color }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.appName }}-indexer
        color: {{ .Values.color }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    color: {{ ternary "green" "blue" (eq .Values.color "blue") }}
                topologyKey: kubernetes.io/hostname
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h {{ .Values.appName }}-db-{{ .Values.color }} -p 5432; do echo waiting for db; sleep 2; done
      containers:
        - name: indexer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ .Values.appName }}-{{ .Values.color }}
            - secretRef:
                name: {{ .Values.appName }}-secrets
            - secretRef:
                name: {{ .Values.appName }}-logtail-{{ .Values.color }}
                optional: true
          env:
            - name: IS_INDEXER
              value: "true"
            - name: GIT_COMMIT
              value: {{ .Values.image.tag | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.appName }}-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgres://{{ .Values.db.user }}:$(POSTGRES_PASSWORD)@{{ .Values.appName }}-db-{{ .Values.color }}:5432/{{ .Values.db.name }}
