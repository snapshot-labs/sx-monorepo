apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}-api-{{ .Values.color }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.appName }}-api
      color: {{ .Values.color }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.appName }}-api
        color: {{ .Values.color }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    color: {{ ternary "green" "blue" (eq .Values.color "blue") }}
                topologyKey: kubernetes.io/hostname
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      containers:
        - name: api
          image: '{{ .Values.image.repository }}:{{ .Values.image.tag }}'
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: {{ .Values.appName }}-{{ .Values.color }}
            - secretRef:
                name: {{ .Values.appName }}-secrets
            - secretRef:
                name: {{ .Values.appName }}-logtail-{{ .Values.color }}
                optional: true
          env:
            - name: IS_INDEXER
              value: 'false'
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.appName }}-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgres://{{ .Values.db.user }}:$(POSTGRES_PASSWORD)@{{ .Values.appName }}-db-{{ .Values.color }}:5432/{{ .Values.db.name }}
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
