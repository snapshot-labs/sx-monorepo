services:
  postgres:
    image: postgres:15.4
    ports:
      - "5432:5432"
    command:
      [
        "postgres",
        "-cshared_preload_libraries=pg_stat_statements",
        "-cmax_connections=200",
      ]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - ./initdb.d:/docker-entrypoint-initdb.d
      - pg:/var/lib/postgresql/data

  agent:
    build:
      context: ../apps/agent
    depends_on:
      - postgres
    env_file:
      - ../apps/agent/.env
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/agent
      PORT: 3002

volumes:
  pg:
    driver: local
